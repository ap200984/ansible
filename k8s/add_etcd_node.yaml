---
- name: Validate etcd expansion request
  hosts: localhost
  gather_facts: false
  vars:
    etcd_client_port: 2379
    etcd_peer_port: 2380
    k8s_master_group: "{{ 'masters' if 'masters' in groups else 'master' }}"
  tasks:
    - name: Validate new etcd node input
      ansible.builtin.assert:
        that:
          - etcd_new_node is defined
          - etcd_new_node | length > 0
          - "'etcd' in groups"
          - etcd_new_node in groups['etcd']
          - groups['etcd'] | reject('equalto', etcd_new_node) | list | length > 0
        fail_msg: >-
          Add the new host to the etcd inventory group, then pass it explicitly:
          -e etcd_new_node=etcd4.

    - name: Build etcd expansion facts
      ansible.builtin.set_fact:
        etcd_new_node_name: "{{ etcd_new_node }}"
        etcd_existing_hosts: "{{ groups['etcd'] | reject('equalto', etcd_new_node) | list }}"
        etcd_expanded_hosts: "{{ groups['etcd'] }}"
        etcd_new_peer_url: >-
          http://{{ hostvars[etcd_new_node].ip_address
                   | default(hostvars[etcd_new_node].ansible_host)
                   | default(etcd_new_node) }}:{{ etcd_peer_port }}

    - name: Build expanded etcd client URL list
      ansible.builtin.set_fact:
        etcd_expanded_client_urls: "{{ etcd_expanded_client_urls | default([]) + ['http://' ~ (hostvars[item].ip_address | default(hostvars[item].ansible_host) | default(item)) ~ ':' ~ etcd_client_port] }}"
      loop: "{{ groups['etcd'] }}"

    - name: Show etcd expansion plan
      ansible.builtin.debug:
        msg: >-
          Adding {{ etcd_new_node }} with peer URL {{ etcd_new_peer_url }}.
          Existing voting members used for etcdctl: {{ etcd_existing_hosts }}.

    - name: Create runtime group for etcd expansion coordinator
      ansible.builtin.add_host:
        name: "{{ etcd_existing_hosts[0] }}"
        groups: etcd_expand_coordinator

    - name: Create runtime group for new etcd node
      ansible.builtin.add_host:
        name: "{{ etcd_new_node }}"
        groups: etcd_expand_new

- name: Register new member in existing etcd cluster
  hosts: etcd_expand_coordinator
  become: true
  gather_facts: false
  vars:
    etcd_client_port: 2379
    etcd_existing_endpoint: "http://127.0.0.1:{{ etcd_client_port }}"
    etcd_new_node: "{{ hostvars['localhost'].etcd_new_node_name }}"
    etcd_new_peer_url: "{{ hostvars['localhost'].etcd_new_peer_url }}"
  tasks:
    - name: List current etcd members
      ansible.builtin.command: "etcdctl --endpoints={{ etcd_existing_endpoint }} member list"
      register: etcd_member_list
      changed_when: false

    - name: Add new etcd member
      ansible.builtin.command: >-
        etcdctl --endpoints={{ etcd_existing_endpoint }}
        member add {{ etcd_new_node }}
        --peer-urls={{ etcd_new_peer_url }}
      register: etcd_member_add
      changed_when: etcd_member_add.rc == 0
      when: etcd_new_node not in etcd_member_list.stdout

- name: Configure and start the new etcd node
  hosts: etcd_expand_new
  become: true
  gather_facts: true
  vars:
    etcd_selected_hosts: "{{ hostvars['localhost'].etcd_expanded_hosts | join(',') }}"
    etcd_initial_cluster_state: existing
  roles:
    - ../roles/create_etcd_cluster

- name: Verify expanded etcd cluster
  hosts: etcd_expand_coordinator
  become: true
  gather_facts: false
  vars:
    etcd_client_urls: "{{ hostvars['localhost'].etcd_expanded_client_urls }}"
  tasks:
    - name: Wait for all etcd endpoints to become healthy
      ansible.builtin.command: "etcdctl --endpoints={{ etcd_client_urls | join(',') }} endpoint health"
      register: etcd_expanded_health
      changed_when: false
      retries: 12
      delay: 5
      until: etcd_expanded_health.rc == 0

    - name: Show expanded etcd members
      ansible.builtin.command: "etcdctl --endpoints={{ etcd_client_urls | join(',') }} member list"
      register: etcd_expanded_members
      changed_when: false

    - name: Print expanded etcd members
      ansible.builtin.debug:
        var: etcd_expanded_members.stdout_lines

- name: Update kube-apiserver etcd endpoints on masters
  hosts: "{{ 'masters' if 'masters' in groups else 'master' }}"
  become: true
  gather_facts: false
  serial: 1
  vars:
    etcd_client_urls: "{{ hostvars['localhost'].etcd_expanded_client_urls }}"
    k8s_kubeconfig_path: /etc/kubernetes/admin.conf
  tasks:
    - name: Update kube-apiserver static pod etcd endpoints
      ansible.builtin.replace:
        path: /etc/kubernetes/manifests/kube-apiserver.yaml
        regexp: '(--etcd-servers=).*'
        replace: '\1{{ etcd_client_urls | join(",") }}'
        backup: true

    - name: Wait for kube-apiserver after endpoint update
      ansible.builtin.command: "kubectl --kubeconfig {{ k8s_kubeconfig_path }} get --raw=/readyz"
      register: kube_apiserver_ready
      changed_when: false
      retries: 24
      delay: 5
      until: kube_apiserver_ready.rc == 0
