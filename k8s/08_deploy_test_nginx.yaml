---
- name: Configure containerd proxy for test image pulls
  hosts: masters:workers
  become: true
  gather_facts: true
  vars_files:
    - ../group_vars/k8s_k112.yml
  vars:
    k8s_squid_port: "{{ squid_port | default(3128) }}"
    k8s_squid_proxy_url: >-
      {{
        'http://' ~ squid_ip ~ ':' ~ k8s_squid_port
        if squid_ip is defined and squid_ip | string | length > 0
        else ''
      }}
    k8s_containerd_proxy_enabled: "{{ k8s_squid_proxy_url | length > 0 }}"
    k8s_containerd_proxy_url: "{{ k8s_squid_proxy_url }}"
  roles:
    - role: apt_sources
    - role: k8s_containerd
      when: >-
        k8s_squid_proxy_url | length > 0 or
        use_nexus | default(false) | bool

- name: Deploy and test nginx in Kubernetes
  hosts: "{{ host | default(groups['masters'][0]) }}"
  become: true
  gather_facts: false
  vars:
    k8s_kubeconfig_path: /etc/kubernetes/admin.conf
    nginx_test_namespace: test-nginx
    nginx_test_name: nginx
    nginx_test_image: nginx:1.27-alpine
    nginx_test_replicas: 2
    nginx_test_node_port: 30080
    nginx_test_reset: true

  tasks:
    - name: Remove previous nginx test namespace
      ansible.builtin.command: >-
        kubectl --kubeconfig {{ k8s_kubeconfig_path }}
        delete namespace {{ nginx_test_namespace }} --ignore-not-found
      register: nginx_test_namespace_delete
      changed_when: "'deleted' in nginx_test_namespace_delete.stdout"
      when: nginx_test_reset | bool

    - name: Wait for previous nginx test namespace removal
      ansible.builtin.command: >-
        kubectl --kubeconfig {{ k8s_kubeconfig_path }}
        get namespace {{ nginx_test_namespace }}
      register: nginx_test_namespace_gone
      changed_when: false
      failed_when: false
      retries: 60
      delay: 2
      until: nginx_test_namespace_gone.rc != 0
      when: nginx_test_reset | bool

    - name: Create nginx namespace
      ansible.builtin.command:
        cmd: "kubectl --kubeconfig {{ k8s_kubeconfig_path }} apply -f -"
        stdin: |
          apiVersion: v1
          kind: Namespace
          metadata:
            name: {{ nginx_test_namespace }}
      register: nginx_test_namespace_apply
      changed_when: "'created' in nginx_test_namespace_apply.stdout or 'configured' in nginx_test_namespace_apply.stdout"

    - name: Deploy nginx application
      ansible.builtin.command:
        cmd: "kubectl --kubeconfig {{ k8s_kubeconfig_path }} apply -f -"
        stdin: |
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: {{ nginx_test_name }}
            namespace: {{ nginx_test_namespace }}
            labels:
              app: {{ nginx_test_name }}
          spec:
            replicas: {{ nginx_test_replicas }}
            selector:
              matchLabels:
                app: {{ nginx_test_name }}
            template:
              metadata:
                labels:
                  app: {{ nginx_test_name }}
                annotations:
                  test-nginx.rollout/run-id: "{{ lookup('ansible.builtin.pipe', 'date +%s') }}"
              spec:
                containers:
                  - name: nginx
                    image: {{ nginx_test_image }}
                    imagePullPolicy: IfNotPresent
                    ports:
                      - containerPort: 80
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: {{ nginx_test_name }}
            namespace: {{ nginx_test_namespace }}
          spec:
            type: NodePort
            selector:
              app: {{ nginx_test_name }}
            ports:
              - name: http
                port: 80
                targetPort: 80
                nodePort: {{ nginx_test_node_port }}
      register: nginx_test_apply
      changed_when: "'created' in nginx_test_apply.stdout or 'configured' in nginx_test_apply.stdout"

    - name: Wait for nginx deployment rollout
      ansible.builtin.command: >-
        kubectl --kubeconfig {{ k8s_kubeconfig_path }}
        -n {{ nginx_test_namespace }}
        rollout status deployment/{{ nginx_test_name }} --timeout=300s
      register: nginx_test_rollout
      changed_when: false
      failed_when: false

    - name: Collect nginx pods
      ansible.builtin.command: >-
        kubectl --kubeconfig {{ k8s_kubeconfig_path }}
        -n {{ nginx_test_namespace }}
        get pods -o wide
      register: nginx_test_pods
      changed_when: false

    - name: Describe nginx deployment
      ansible.builtin.command: >-
        kubectl --kubeconfig {{ k8s_kubeconfig_path }}
        -n {{ nginx_test_namespace }}
        describe deployment/{{ nginx_test_name }}
      register: nginx_test_deployment
      changed_when: false
      failed_when: false
      when: nginx_test_rollout.rc != 0

    - name: Show recent namespace events
      ansible.builtin.command: >-
        kubectl --kubeconfig {{ k8s_kubeconfig_path }}
        -n {{ nginx_test_namespace }}
        get events --sort-by=.lastTimestamp
      register: nginx_test_events
      changed_when: false
      failed_when: false
      when: nginx_test_rollout.rc != 0

    - name: Fail with nginx rollout diagnostics
      ansible.builtin.fail:
        msg: |
          nginx rollout failed.

          Rollout:
          {{ nginx_test_rollout.stdout }}
          {{ nginx_test_rollout.stderr }}

          Pods:
          {{ nginx_test_pods.stdout }}

          Deployment:
          {{ nginx_test_deployment.stdout | default('') }}

          Events:
          {{ nginx_test_events.stdout | default('') }}
      when: nginx_test_rollout.rc != 0

    - name: Test nginx service inside cluster
      ansible.builtin.command: >-
        kubectl --kubeconfig {{ k8s_kubeconfig_path }}
        -n {{ nginx_test_namespace }}
        exec deployment/{{ nginx_test_name }}
        --
        wget -qO- http://{{ nginx_test_name }}.{{ nginx_test_namespace }}.svc.cluster.local
      register: nginx_test_cluster_curl
      changed_when: false

    - name: Test nginx NodePort from master
      ansible.builtin.uri:
        url: "http://{{ hostvars[groups['workers'][0]].ansible_host | default(groups['workers'][0]) }}:{{ nginx_test_node_port }}"
        status_code: 200
        return_content: false
      register: nginx_test_nodeport

    - name: Show nginx test result
      ansible.builtin.debug:
        msg: |
          nginx pods:
          {{ nginx_test_pods.stdout }}

          Cluster DNS/service test: ok
          NodePort test: http://{{ hostvars[groups['workers'][0]].ansible_host | default(groups['workers'][0]) }}:{{ nginx_test_node_port }} ok
