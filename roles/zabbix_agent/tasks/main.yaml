---
- name: Get system hostname
  command: hostname
  register: zabbix_agent_system_hostname
  changed_when: false
  when: hostname is not defined or hostname | length == 0
  tags:
    - zabbix_agent
    - "zabbix_agent:vars"
    - "zabbix_agent:config"

- name: Set Zabbix agent hostname
  set_fact:
    zabbix_agent_hostname: >-
      {{ hostname if hostname is defined and hostname | length > 0 else zabbix_agent_system_hostname.stdout }}
    zabbix_agent_server: "{{ zabbix_server | default(server) }}"
    zabbix_agent_server_active: "{{ zabbix_server | default(server_active) }}"
    zabbix_agent_host_metadata: >-
      os=linux,zabbix_proxy={{ zabbix_server | default(server) }},group={{ zabbix_agent_host_metadata_group }},tag={{ zabbix_agent_host_metadata_tag }}
  tags:
    - zabbix_agent
    - "zabbix_agent:vars"
    - "zabbix_agent:config"

- name: Set Zabbix release package URL
  set_fact:
    zabbix_agent_release_url: >-
      {{
        zabbix_agent_repository_base_url ~ '/zabbix/7.4/release/debian/pool/main/z/zabbix-release/zabbix-release_' ~ zabbix_agent_release_version ~ '%2Bdebian' ~ ansible_distribution_major_version ~ '_all.deb'
        if ansible_distribution | lower == 'debian'
        else zabbix_agent_repository_base_url ~ '/zabbix/7.4/release/ubuntu/pool/main/z/zabbix-release/zabbix-release_' ~ zabbix_agent_release_version ~ '%2Bubuntu' ~ ansible_distribution_version ~ '_all.deb'
        if ansible_distribution | lower == 'ubuntu'
        else ''
      }}
  tags:
    - zabbix_agent
    - "zabbix_agent:repo"
    - "zabbix_agent:packages"

- name: Validate Zabbix Agent 2 supported distribution
  assert:
    that:
      - zabbix_agent_release_url | length > 0
    fail_msg: "Zabbix Agent 2 role supports Debian and Ubuntu only."
  tags:
    - zabbix_agent
    - "zabbix_agent:validate"
    - "zabbix_agent:repo"
    - "zabbix_agent:packages"

- name: Validate Nexus Zabbix repository settings
  ansible.builtin.assert:
    that:
      - nexus_url is defined
      - nexus_url | string | length > 0
      - nexus_url | urlsplit('scheme') in ['http', 'https']
    fail_msg: >-
      use_nexus requires nexus_url for the Zabbix package proxy.
  when: zabbix_agent_use_nexus | bool
  tags:
    - zabbix_agent
    - "zabbix_agent:validate"
    - "zabbix_agent:repo"

- name: Validate Zabbix Agent 2 PSK configuration
  assert:
    that:
      - psk_identity | length > 0
      - psk | length > 0
      - psk is match('^[0-9a-fA-F]+$')
      - psk | length >= 32
      - psk | length <= 512
      - psk | length is divisibleby 2
    fail_msg: >-
      zabbix_agent_psk must be defined in group_vars/all/passwords.yml as an
      even-length hexadecimal PSK between 32 and 512 characters.
  no_log: true
  tags:
    - zabbix_agent
    - "zabbix_agent:validate"
    - "zabbix_agent:config"

- name: Stop old Zabbix agent if present
  service:
    name: zabbix-agent
    enabled: false
    state: stopped
  failed_when: false
  tags:
    - zabbix_agent
    - "zabbix_agent:remove_old"

- name: Remove old Zabbix agent package
  apt:
    name: zabbix-agent
    state: absent
    purge: true
    update_cache: false
  tags:
    - zabbix_agent
    - "zabbix_agent:remove_old"

- name: Remove old Zabbix agent config
  file:
    path: /etc/zabbix/zabbix_agentd.conf
    state: absent
  tags:
    - zabbix_agent
    - "zabbix_agent:remove_old"

- name: Install Zabbix 7.4 release repository
  apt:
    deb: "{{ zabbix_agent_release_url }}"
  tags:
    - zabbix_agent
    - "zabbix_agent:repo"

- name: Find Zabbix apt source files
  ansible.builtin.find:
    paths: /etc/apt/sources.list.d
    patterns:
      - "zabbix*.list"
      - "zabbix*.sources"
    file_type: file
  register: zabbix_agent_source_files
  tags:
    - zabbix_agent
    - "zabbix_agent:repo"

- name: Route Zabbix apt sources through Nexus
  ansible.builtin.replace:
    path: "{{ item.path }}"
    regexp: 'https?://repo\.zabbix\.com'
    replace: "{{ zabbix_agent_nexus_base_url }}"
  loop: "{{ zabbix_agent_source_files.files }}"
  loop_control:
    label: "{{ item.path }}"
  when: zabbix_agent_use_nexus | bool
  register: zabbix_agent_nexus_sources
  tags:
    - zabbix_agent
    - "zabbix_agent:repo"

- name: Restore direct Zabbix apt sources when Nexus is disabled
  ansible.builtin.replace:
    path: "{{ item.path }}"
    regexp: 'https?://\S+/repository/zabbix-proxy'
    replace: "{{ zabbix_agent_upstream_base_url }}"
  loop: "{{ zabbix_agent_source_files.files }}"
  loop_control:
    label: "{{ item.path }}"
  when: not (zabbix_agent_use_nexus | bool)
  register: zabbix_agent_upstream_sources
  tags:
    - zabbix_agent
    - "zabbix_agent:repo"

- name: Refresh apt metadata after changing Zabbix sources
  ansible.builtin.apt:
    update_cache: true
  when: >-
    (zabbix_agent_nexus_sources is defined and
     zabbix_agent_nexus_sources.changed | default(false)) or
    (zabbix_agent_upstream_sources is defined and
     zabbix_agent_upstream_sources.changed | default(false))
  tags:
    - zabbix_agent
    - "zabbix_agent:repo"

- name: Install ACL package
  apt:
    name: acl
    state: present
    update_cache: true
  tags:
    - zabbix_agent
    - "zabbix_agent:packages"

- name: Install Zabbix Agent 2
  apt:
    name: zabbix-agent2
    state: latest
  tags:
    - zabbix_agent
    - "zabbix_agent:packages"

- name: Configure Zabbix Agent 2 PSK file
  copy:
    dest: "{{ zabbix_agent_psk_file }}"
    owner: root
    group: zabbix
    mode: "0640"
    content: "{{ psk }}\n"
  no_log: true
  notify: Restart zabbix-agent2
  tags:
    - zabbix_agent
    - "zabbix_agent:config"

- name: Configure Zabbix Agent 2
  copy:
    dest: /etc/zabbix/zabbix_agent2.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      PidFile=/var/run/zabbix/zabbix_agent2.pid
      LogFile=/var/log/zabbix/zabbix_agent2.log
      LogFileSize=0
      Server={{ zabbix_agent_server }}
      ServerActive={{ zabbix_agent_server_active }}
      Hostname={{ zabbix_agent_hostname }}
      HostMetadata={{ zabbix_agent_host_metadata }}
      TLSConnect=psk
      TLSAccept=psk
      TLSPSKIdentity={{ psk_identity }}
      TLSPSKFile={{ zabbix_agent_psk_file }}
      Include=/etc/zabbix/zabbix_agent2.d/*.conf
      PluginSocket=/run/zabbix/agent.plugin.sock
      ControlSocket=/run/zabbix/agent.sock
      AllowKey=system.run[*]
      Include=/etc/zabbix/zabbix_agent2.d/plugins.d/*.conf
  notify: Restart zabbix-agent2
  tags:
    - zabbix_agent
    - "zabbix_agent:config"

- name: Ensure Zabbix Agent 2 is enabled and started
  service:
    name: zabbix-agent2
    enabled: true
    state: started
  tags:
    - zabbix_agent
    - "zabbix_agent:service"
