---
docker_apt_arch_map:
  x86_64: amd64
  aarch64: arm64
  armv7l: armhf
docker_apt_arch: "{{ docker_apt_arch_map.get(ansible_architecture, ansible_architecture) }}"
docker_apt_key_path: /etc/apt/keyrings/docker.asc
docker_apt_repo_url: "https://download.docker.com/linux/{{ ansible_distribution | lower }}"
docker_apt_repo: >-
  deb [arch={{ docker_apt_arch }} signed-by={{ docker_apt_key_path }}]
  {{ docker_apt_repo_url }} {{ ansible_distribution_release }} stable
