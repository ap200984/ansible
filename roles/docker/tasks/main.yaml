---
- name: Find existing apt repository definition files
  ansible.builtin.find:
    paths: /etc/apt/sources.list.d
    patterns:
      - "*.list"
      - "*.sources"
    file_type: file
  register: docker_apt_source_files
  tags:
    - docker
    - "docker:packages"
    - "docker:repo"

- name: Read existing apt repository definition files
  ansible.builtin.slurp:
    src: "{{ item.path }}"
  loop: "{{ docker_apt_source_files.files }}"
  loop_control:
    label: "{{ item.path }}"
  register: docker_apt_source_contents
  tags:
    - docker
    - "docker:packages"
    - "docker:repo"

- name: Remove conflicting Docker apt repository definition files
  ansible.builtin.file:
    path: "{{ item.item.path }}"
    state: absent
  loop: "{{ docker_apt_source_contents.results }}"
  loop_control:
    label: "{{ item.item.path }}"
  when: >-
    'download.docker.com' in (item.content | default('') | b64decode) and
    (item.item.path != '/etc/apt/sources.list.d/docker.list' or
     (item.content | default('') | b64decode | trim) != docker_apt_repo)
  tags:
    - docker
    - "docker:packages"
    - "docker:repo"

- name: Check the main apt sources file
  ansible.builtin.stat:
    path: /etc/apt/sources.list
  register: docker_main_sources
  tags:
    - docker
    - "docker:packages"
    - "docker:repo"

- name: Remove conflicting Docker repository entries from sources.list
  ansible.builtin.lineinfile:
    path: /etc/apt/sources.list
    regexp: '^[^#].*download\.docker\.com.*$'
    state: absent
  when: docker_main_sources.stat.exists
  tags:
    - docker
    - "docker:packages"
    - "docker:repo"

- name: Install Docker repository prerequisites
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true
  tags:
    - docker
    - "docker:packages"

- name: Ensure apt keyring directory exists
  file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags:
    - docker
    - "docker:repo"

- name: Add Docker apt repository key
  get_url:
    url: "{{ docker_apt_repo_url }}/gpg"
    dest: "{{ docker_apt_key_path }}"
    owner: root
    group: root
    mode: "0644"
  tags:
    - docker
    - "docker:repo"

- name: Add Docker apt repository
  apt_repository:
    repo: "{{ docker_apt_repo }}"
    filename: docker
    state: present
    update_cache: true
  tags:
    - docker
    - "docker:repo"

- name: Install Docker and Docker Compose
  apt:
    name: "{{ docker_upstream_packages }}"
    state: present
  tags:
    - docker
    - "docker:packages"

- name: Validate Nexus Docker registry settings
  ansible.builtin.assert:
    that:
      - docker_nexus_registry | string | length > 0
      - "':' in docker_nexus_registry"
    fail_msg: >-
      use_nexus requires nexus_docker_registry in host or inventory variables.
  when: docker_use_nexus | bool
  tags:
    - docker
    - "docker:config"

- name: Check for an existing Docker daemon configuration
  ansible.builtin.stat:
    path: /etc/docker/daemon.json
  register: docker_daemon_config_file
  when: docker_use_nexus | bool
  tags:
    - docker
    - "docker:config"

- name: Read the existing Docker daemon configuration
  ansible.builtin.slurp:
    src: /etc/docker/daemon.json
  register: docker_daemon_config_content
  when:
    - docker_use_nexus | bool
    - docker_daemon_config_file.stat.exists
  tags:
    - docker
    - "docker:config"

- name: Configure Nexus as the Docker Hub registry mirror
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: "0644"
    content: >-
      {{ docker_existing_daemon_config |
         combine({
           'registry-mirrors': ['http://' ~ docker_nexus_registry],
           'insecure-registries': [docker_nexus_registry]
         }) | to_nice_json }}
  vars:
    docker_existing_daemon_config: >-
      {{ (docker_daemon_config_content.content | b64decode | from_json)
         if docker_daemon_config_file.stat.exists
         else {} }}
  register: docker_nexus_daemon_config
  when: docker_use_nexus | bool
  tags:
    - docker
    - "docker:config"

- name: Restart Docker after configuring the Nexus registry mirror
  ansible.builtin.service:
    name: docker
    state: restarted
  when:
    - docker_use_nexus | bool
    - docker_nexus_daemon_config.changed
  tags:
    - docker
    - "docker:config"

- name: Ensure Docker is enabled and started
  service:
    name: docker
    enabled: true
    state: started
  tags:
    - docker
    - "docker:service"
