---
- name: Create controller proxy directory
  ansible.builtin.file:
    path: "{{ local_apt_proxy_dir }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false
  run_once: true
  when: local_apt_proxy_enabled | bool
  tags:
    - local_apt_proxy

- name: Install controller HTTP proxy script
  ansible.builtin.copy:
    src: simple_http_proxy.py
    dest: "{{ local_apt_proxy_script }}"
    mode: "0700"
  delegate_to: localhost
  become: false
  run_once: true
  when: local_apt_proxy_enabled | bool
  tags:
    - local_apt_proxy

- name: Start controller HTTP proxy
  ansible.builtin.shell: >-
    python3 -c "import socket, sys; s = socket.socket(); s.settimeout(1); sys.exit(0 if s.connect_ex(('{{ local_apt_proxy_controller_host }}', {{ local_apt_proxy_controller_port }})) == 0 else 1)"
    || nohup python3 {{ local_apt_proxy_script }}
    --host {{ local_apt_proxy_controller_host }}
    --port {{ local_apt_proxy_controller_port }}
    >> {{ local_apt_proxy_log }} 2>&1 &
  delegate_to: localhost
  become: false
  run_once: true
  changed_when: false
  when: local_apt_proxy_enabled | bool
  tags:
    - local_apt_proxy

- name: Wait for controller HTTP proxy
  ansible.builtin.wait_for:
    host: "{{ local_apt_proxy_controller_host }}"
    port: "{{ local_apt_proxy_controller_port }}"
    timeout: 10
  delegate_to: localhost
  become: false
  run_once: true
  when: local_apt_proxy_enabled | bool
  tags:
    - local_apt_proxy

- name: Start reverse SSH tunnel for target proxy
  ansible.builtin.shell: >-
    ssh -S {{ local_apt_proxy_dir }}/{{ inventory_hostname }}.ctl
    -O check
    {{ ansible_ssh_common_args | default('') }}
    -i {{ ansible_ssh_private_key_file | default('~/.ssh/id_rsa') }}
    -l {{ ansible_user | default('root') }}
    {{ ansible_host | default(inventory_hostname) }}
    >/dev/null 2>&1
    || ssh -fN -M
    -S {{ local_apt_proxy_dir }}/{{ inventory_hostname }}.ctl
    -o ExitOnForwardFailure=yes
    -o ServerAliveInterval=30
    -o ServerAliveCountMax=3
    -R 127.0.0.1:{{ local_apt_proxy_target_port }}:{{ local_apt_proxy_controller_host }}:{{ local_apt_proxy_controller_port }}
    {{ ansible_ssh_common_args | default('') }}
    -i {{ ansible_ssh_private_key_file | default('~/.ssh/id_rsa') }}
    -l {{ ansible_user | default('root') }}
    {{ ansible_host | default(inventory_hostname) }}
  delegate_to: localhost
  become: false
  changed_when: false
  when: local_apt_proxy_enabled | bool
  tags:
    - local_apt_proxy

- name: Set local proxy URL for later roles
  ansible.builtin.set_fact:
    kubernetes_apt_proxy_effective: "{{ local_apt_proxy_url }}"
    containerd_proxy_url: "{{ local_apt_proxy_url }}"
  when: local_apt_proxy_enabled | bool
  tags:
    - local_apt_proxy
