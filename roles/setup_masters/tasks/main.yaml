---
- name: Validate master_float_ip is configured
  ansible.builtin.assert:
    that:
      - master_float_ip is defined
      - master_float_ip | length > 0
    fail_msg: "master_float_ip is required, usually under [k8s:vars]."
  tags:
    - setup_masters
    - "setup_masters:validate"

- name: Set control-plane variables
  ansible.builtin.set_fact:
    k8s_etcd_hosts: "{{ etcd_nodes.split(',') | map('trim') | reject('equalto', '') | list }}"
    k8s_first_master: "{{ groups[k8s_master_group][0] }}"
  tags:
    - setup_masters
    - "setup_masters:vars"

- name: Install HAProxy and Keepalived
  ansible.builtin.apt:
    name:
      - haproxy
      - keepalived
    state: present
    update_cache: false
  when: ansible_os_family == "Debian"
  tags:
    - setup_masters
    - "setup_masters:packages"

- name: Allow HAProxy to bind the floating API address
  ansible.posix.sysctl:
    name: net.ipv4.ip_nonlocal_bind
    value: "1"
    state: present
    reload: true
    sysctl_file: /etc/sysctl.d/99-kubernetes-ha.conf
  tags:
    - setup_masters
    - "setup_masters:sysctl"

- name: Configure HAProxy for Kubernetes API
  ansible.builtin.template:
    src: haproxy.cfg.j2
    dest: /etc/haproxy/haproxy.cfg
    owner: root
    group: root
    mode: "0644"
  notify: Restart haproxy
  tags:
    - setup_masters
    - "setup_masters:haproxy"

- name: Configure Keepalived floating IP
  ansible.builtin.template:
    src: keepalived.conf.j2
    dest: /etc/keepalived/keepalived.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart keepalived
  tags:
    - setup_masters
    - "setup_masters:keepalived"

- name: Ensure HA services are enabled and started
  ansible.builtin.service:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
    - haproxy
    - keepalived
  tags:
    - setup_masters
    - "setup_masters:service"

- name: Apply HA service configuration
  ansible.builtin.meta: flush_handlers
  tags:
    - setup_masters
    - "setup_masters:service"

- name: Render kubeadm init configuration
  ansible.builtin.template:
    src: "{{ playbook_dir }}/kubeadm_config.yaml.j2"
    dest: "{{ k8s_kubeadm_config_path }}"
    owner: root
    group: root
    mode: "0600"
  tags:
    - setup_masters
    - "setup_masters:kubeadm"

- name: Check whether Kubernetes API is already healthy
  ansible.builtin.command: "kubectl --kubeconfig {{ k8s_kubeconfig_path }} get --raw=/healthz"
  register: k8s_api_health
  changed_when: false
  failed_when: false
  when: inventory_hostname == k8s_first_master
  tags:
    - setup_masters
    - "setup_masters:kubeadm"

- name: Pre-pull Kubernetes control plane images
  ansible.builtin.command: >-
    kubeadm config images pull
    --config {{ k8s_kubeadm_config_path }}
  when:
    - inventory_hostname == k8s_first_master
    - k8s_api_health.rc != 0
    - k8s_kubeadm_pull_images_before_init | bool
  tags:
    - setup_masters
    - "setup_masters:kubeadm"

- name: Initialize first Kubernetes master
  when:
    - inventory_hostname == k8s_first_master
    - k8s_api_health.rc != 0
  block:
    - name: Run kubeadm init
      ansible.builtin.command: >-
        kubeadm init
        --config {{ k8s_kubeadm_config_path }}
        --upload-certs
        {% if k8s_kubeadm_ignore_preflight_errors | length > 0 %}
        --ignore-preflight-errors={{ k8s_kubeadm_ignore_preflight_errors }}
        {% endif %}
  rescue:
    - name: Collect kubelet status after failed init
      ansible.builtin.command: systemctl status kubelet --no-pager
      register: k8s_kubelet_status
      changed_when: false
      failed_when: false

    - name: Collect recent kubelet logs after failed init
      ansible.builtin.command: journalctl -u kubelet -n 120 --no-pager
      register: k8s_kubelet_logs
      changed_when: false
      failed_when: false

    - name: List Kubernetes containers after failed init
      ansible.builtin.shell: "crictl --runtime-endpoint unix:///run/containerd/containerd.sock ps -a | grep kube || true"
      register: k8s_crictl_ps
      changed_when: false
      failed_when: false

    - name: Collect failed Kubernetes container logs
      ansible.builtin.shell: |
        set -o pipefail
        for id in $(crictl --runtime-endpoint unix:///run/containerd/containerd.sock ps -a | awk '/kube-|coredns/ {print $1}'); do
          echo "===== container ${id} ====="
          crictl --runtime-endpoint unix:///run/containerd/containerd.sock logs --tail=80 "${id}" || true
        done
      args:
        executable: /bin/bash
      register: k8s_container_logs
      changed_when: false
      failed_when: false

    - name: Show kubeadm init diagnostics
      ansible.builtin.debug:
        msg: |
          kubeadm init failed. Useful diagnostics:

          === kubelet status ===
          {{ k8s_kubelet_status.stdout | default('') }}
          {{ k8s_kubelet_status.stderr | default('') }}

          === kubelet recent logs ===
          {{ k8s_kubelet_logs.stdout | default('') }}
          {{ k8s_kubelet_logs.stderr | default('') }}

          === crictl ps ===
          {{ k8s_crictl_ps.stdout | default('') }}
          {{ k8s_crictl_ps.stderr | default('') }}

          === container logs ===
          {{ k8s_container_logs.stdout | default('') }}
          {{ k8s_container_logs.stderr | default('') }}

    - name: Fail after kubeadm init diagnostics
      ansible.builtin.fail:
        msg: >-
          kubeadm init failed. See diagnostics above. On very small masters,
          the most common cause is kube-apiserver or another control-plane
          container being OOM-killed.
  tags:
    - setup_masters
    - "setup_masters:kubeadm"

- name: Create root kubeconfig directory
  ansible.builtin.file:
    path: /root/.kube
    state: directory
    owner: root
    group: root
    mode: "0700"
  when: inventory_hostname == k8s_first_master
  tags:
    - setup_masters
    - "setup_masters:kubeconfig"

- name: Configure root kubeconfig
  ansible.builtin.copy:
    src: "{{ k8s_kubeconfig_path }}"
    dest: /root/.kube/config
    owner: root
    group: root
    mode: "0600"
    remote_src: true
  when: inventory_hostname == k8s_first_master
  tags:
    - setup_masters
    - "setup_masters:kubeconfig"

- name: Check whether admin kubeconfig has cluster-admin permissions
  ansible.builtin.command: >-
    kubectl --kubeconfig {{ k8s_kubeconfig_path }}
    auth can-i get customresourcedefinitions.apiextensions.k8s.io --all-namespaces
  register: k8s_admin_can_get_crds
  changed_when: false
  failed_when: false
  when: inventory_hostname == k8s_first_master
  tags:
    - setup_masters
    - "setup_masters:kubeconfig"

- name: Check super-admin kubeconfig
  ansible.builtin.stat:
    path: "{{ k8s_super_admin_kubeconfig_path }}"
  register: k8s_super_admin_conf
  when:
    - inventory_hostname == k8s_first_master
    - k8s_admin_can_get_crds.rc != 0
  tags:
    - setup_masters
    - "setup_masters:kubeconfig"

- name: Repair kubeadm admin cluster role binding
  ansible.builtin.command: >-
    kubectl --kubeconfig {{ k8s_super_admin_kubeconfig_path }}
    create clusterrolebinding kubeadm:cluster-admins
    --clusterrole=cluster-admin
    --group=kubeadm:cluster-admins
  register: k8s_repair_admin_binding
  changed_when: k8s_repair_admin_binding.rc == 0
  failed_when:
    - k8s_repair_admin_binding.rc != 0
    - "'AlreadyExists' not in k8s_repair_admin_binding.stderr"
  when:
    - inventory_hostname == k8s_first_master
    - k8s_admin_can_get_crds.rc != 0
    - k8s_super_admin_conf.stat.exists
  tags:
    - setup_masters
    - "setup_masters:kubeconfig"

- name: Verify admin kubeconfig permissions after repair
  ansible.builtin.command: >-
    kubectl --kubeconfig {{ k8s_kubeconfig_path }}
    auth can-i get customresourcedefinitions.apiextensions.k8s.io --all-namespaces
  register: k8s_admin_can_get_crds_after_repair
  changed_when: false
  failed_when: k8s_admin_can_get_crds_after_repair.stdout != "yes"
  when: inventory_hostname == k8s_first_master
  tags:
    - setup_masters
    - "setup_masters:kubeconfig"

- name: Label first Kubernetes control-plane node
  ansible.builtin.command: >-
    kubectl --kubeconfig {{ k8s_kubeconfig_path }}
    label node {{ inventory_hostname }} node-role.kubernetes.io/control-plane= --overwrite
  register: k8s_label_first_control_plane_node
  changed_when: "'not labeled' not in k8s_label_first_control_plane_node.stdout"
  when: inventory_hostname == k8s_first_master
  tags:
    - setup_masters
    - "setup_masters:labels"

- name: Allow kubeadm token discovery to read public cluster info
  ansible.builtin.shell: |
    set -e
    kubectl --kubeconfig {{ k8s_kubeconfig_path }} apply -f - <<'EOF'
    apiVersion: rbac.authorization.k8s.io/v1
    kind: Role
    metadata:
      name: kubeadm:bootstrap-cluster-info-reader
      namespace: kube-public
    rules:
      - apiGroups:
          - ""
        resources:
          - configmaps
        resourceNames:
          - cluster-info
        verbs:
          - get
    ---
    apiVersion: rbac.authorization.k8s.io/v1
    kind: RoleBinding
    metadata:
      name: kubeadm:bootstrap-cluster-info-reader
      namespace: kube-public
    roleRef:
      apiGroup: rbac.authorization.k8s.io
      kind: Role
      name: kubeadm:bootstrap-cluster-info-reader
    subjects:
      - apiGroup: rbac.authorization.k8s.io
        kind: Group
        name: system:unauthenticated
    EOF
  args:
    executable: /bin/bash
  register: k8s_bootstrap_discovery_rbac
  changed_when: "'created' in k8s_bootstrap_discovery_rbac.stdout or 'configured' in k8s_bootstrap_discovery_rbac.stdout"
  when: inventory_hostname == k8s_first_master
  tags:
    - setup_masters
    - "setup_masters:kubeconfig"

- name: Check kubeadm public cluster info ConfigMap
  ansible.builtin.command: >-
    kubectl --kubeconfig {{ k8s_kubeconfig_path }}
    -n kube-public get configmap cluster-info
  register: k8s_cluster_info_configmap
  changed_when: false
  failed_when: false
  when: inventory_hostname == k8s_first_master
  tags:
    - setup_masters
    - "setup_masters:kubeconfig"

- name: Recreate kubeadm bootstrap token discovery data
  ansible.builtin.command: >-
    kubeadm init phase bootstrap-token
    --config {{ k8s_kubeadm_config_path }}
  register: k8s_recreate_bootstrap_token_discovery
  changed_when: k8s_recreate_bootstrap_token_discovery.rc == 0
  when:
    - inventory_hostname == k8s_first_master
    - k8s_cluster_info_configmap.rc != 0
  tags:
    - setup_masters
    - "setup_masters:kubeconfig"

- name: Allow kubeadm bootstrap tokens to read join configuration
  ansible.builtin.shell: |
    set -e
    kubectl --kubeconfig {{ k8s_kubeconfig_path }} apply -f - <<'EOF'
    apiVersion: rbac.authorization.k8s.io/v1
    kind: Role
    metadata:
      name: kubeadm:bootstrap-control-plane-join
      namespace: kube-system
    rules:
      - apiGroups:
          - ""
        resources:
          - configmaps
        resourceNames:
          - kubeadm-config
          - kubelet-config
          - kube-proxy
        verbs:
          - get
      - apiGroups:
          - ""
        resources:
          - secrets
        resourceNames:
          - kubeadm-certs
        verbs:
          - get
    ---
    apiVersion: rbac.authorization.k8s.io/v1
    kind: RoleBinding
    metadata:
      name: kubeadm:bootstrap-control-plane-join
      namespace: kube-system
    roleRef:
      apiGroup: rbac.authorization.k8s.io
      kind: Role
      name: kubeadm:bootstrap-control-plane-join
    subjects:
      - apiGroup: rbac.authorization.k8s.io
        kind: Group
        name: system:bootstrappers:kubeadm:default-node-token
    EOF
  args:
    executable: /bin/bash
  register: k8s_bootstrap_join_rbac
  changed_when: "'created' in k8s_bootstrap_join_rbac.stdout or 'configured' in k8s_bootstrap_join_rbac.stdout"
  when: inventory_hostname == k8s_first_master
  tags:
    - setup_masters
    - "setup_masters:kubeconfig"

- name: Check kubeadm cluster configuration ConfigMap
  ansible.builtin.command: >-
    kubectl --kubeconfig {{ k8s_kubeconfig_path }}
    -n kube-system get configmap kubeadm-config
  register: k8s_kubeadm_config_configmap
  changed_when: false
  failed_when: false
  when: inventory_hostname == k8s_first_master
  tags:
    - setup_masters
    - "setup_masters:kubeconfig"

- name: Recreate kubeadm cluster configuration ConfigMap
  ansible.builtin.command: >-
    kubeadm init phase upload-config kubeadm
    --config {{ k8s_kubeadm_config_path }}
  register: k8s_recreate_kubeadm_config_configmap
  changed_when: k8s_recreate_kubeadm_config_configmap.rc == 0
  when:
    - inventory_hostname == k8s_first_master
    - k8s_kubeadm_config_configmap.rc != 0
  tags:
    - setup_masters
    - "setup_masters:kubeconfig"

- name: Check kubeadm kubelet configuration ConfigMap
  ansible.builtin.command: >-
    kubectl --kubeconfig {{ k8s_kubeconfig_path }}
    -n kube-system get configmap kubelet-config
  register: k8s_kubelet_config_configmap
  changed_when: false
  failed_when: false
  when: inventory_hostname == k8s_first_master
  tags:
    - setup_masters
    - "setup_masters:kubeconfig"

- name: Recreate kubeadm kubelet configuration ConfigMap
  ansible.builtin.command: >-
    kubeadm init phase upload-config kubelet
    --config {{ k8s_kubeadm_config_path }}
  register: k8s_recreate_kubelet_config_configmap
  changed_when: k8s_recreate_kubelet_config_configmap.rc == 0
  when:
    - inventory_hostname == k8s_first_master
    - k8s_kubelet_config_configmap.rc != 0
  tags:
    - setup_masters
    - "setup_masters:kubeconfig"
