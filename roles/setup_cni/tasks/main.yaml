---
- name: Check first master admin kubeconfig
  ansible.builtin.stat:
    path: "{{ k8s_kubeconfig_path }}"
  register: k8s_cni_admin_conf
  tags:
    - setup_cni
    - "setup_cni:validate"

- name: Check first master super-admin kubeconfig
  ansible.builtin.stat:
    path: "{{ k8s_super_admin_kubeconfig_path }}"
  register: k8s_cni_super_admin_conf
  tags:
    - setup_cni
    - "setup_cni:validate"

- name: Validate first master is initialized before installing CNI
  ansible.builtin.assert:
    that:
      - k8s_cni_admin_conf.stat.exists or k8s_cni_super_admin_conf.stat.exists
    fail_msg: >-
      Kubernetes control plane is not initialized
      ({{ k8s_kubeconfig_path }} and {{ k8s_super_admin_kubeconfig_path }}
      are missing). Fix kubeadm init before installing Calico.
  tags:
    - setup_cni
    - "setup_cni:validate"

- name: Select kubeconfig for installing CNI
  ansible.builtin.set_fact:
    k8s_cni_kubeconfig_path: >-
      {{ k8s_super_admin_kubeconfig_path
         if k8s_cni_super_admin_conf.stat.exists
         else k8s_kubeconfig_path }}
  tags:
    - setup_cni
    - "setup_cni:validate"

- name: Check whether Calico is already installed
  ansible.builtin.command: >-
    kubectl --kubeconfig {{ k8s_cni_kubeconfig_path }}
    -n kube-system get daemonset calico-node
  register: calico_node_daemonset
  changed_when: false
  failed_when: false
  tags:
    - setup_cni
    - "setup_cni:calico"

- name: Configure direct Kubernetes API endpoint for Calico
  ansible.builtin.command: >-
    kubectl --kubeconfig {{ k8s_cni_kubeconfig_path }}
    -n kube-system create configmap kubernetes-services-endpoint
    --from-literal=KUBERNETES_SERVICE_HOST={{ calico_kubernetes_service_host }}
    --from-literal=KUBERNETES_SERVICE_PORT={{ calico_kubernetes_service_port }}
    --dry-run=client -o yaml
  register: calico_services_endpoint_manifest
  changed_when: false
  when: calico_force_apply | bool or calico_node_daemonset.rc != 0
  tags:
    - setup_cni
    - "setup_cni:calico"

- name: Apply direct Kubernetes API endpoint for Calico
  ansible.builtin.command:
    cmd: "kubectl --kubeconfig {{ k8s_cni_kubeconfig_path }} apply -f -"
    stdin: "{{ calico_services_endpoint_manifest.stdout }}"
  register: calico_services_endpoint_apply
  changed_when: "'created' in calico_services_endpoint_apply.stdout or 'configured' in calico_services_endpoint_apply.stdout"
  when: calico_force_apply | bool or calico_node_daemonset.rc != 0
  tags:
    - setup_cni
    - "setup_cni:calico"

- name: Download Calico manifest
  ansible.builtin.get_url:
    url: "{{ calico_manifest_url }}"
    dest: "{{ calico_manifest_path }}"
    mode: "0644"
  when: calico_force_apply | bool or calico_node_daemonset.rc != 0
  tags:
    - setup_cni
    - "setup_cni:calico"

- name: Render Calico manifest with Kubernetes pod CIDR
  ansible.builtin.replace:
    path: "{{ calico_manifest_path }}"
    regexp: '(^\s*)#?\s*- name: CALICO_IPV4POOL_CIDR\n\s*#?\s*value: "192\.168\.0\.0/16"'
    replace: |-
      \1- name: CALICO_IPV4POOL_CIDR
      \1  value: "{{ calico_pod_cidr }}"
  when: calico_force_apply | bool or calico_node_daemonset.rc != 0
  tags:
    - setup_cni
    - "setup_cni:calico"

- name: Install Calico CNI
  ansible.builtin.command: "kubectl --kubeconfig {{ k8s_cni_kubeconfig_path }} apply -f {{ calico_manifest_path }}"
  register: calico_apply
  changed_when: "'created' in calico_apply.stdout or 'configured' in calico_apply.stdout"
  when: calico_force_apply | bool or calico_node_daemonset.rc != 0
  tags:
    - setup_cni
    - "setup_cni:calico"

- name: Ensure Calico DaemonSet uses Kubernetes pod CIDR
  ansible.builtin.command: >-
    kubectl --kubeconfig {{ k8s_cni_kubeconfig_path }}
    -n kube-system set env daemonset/calico-node
    CALICO_IPV4POOL_CIDR={{ calico_pod_cidr }}
  register: calico_pool_cidr_env
  changed_when: "'updated' in calico_pool_cidr_env.stdout"
  failed_when:
    - calico_pool_cidr_env.rc != 0
    - "'not found' not in calico_pool_cidr_env.stderr"
  when: calico_force_apply | bool or calico_node_daemonset.rc != 0
  tags:
    - setup_cni
    - "setup_cni:calico"

- name: Restart Calico nodes after forced CNI configuration update
  ansible.builtin.command: >-
    kubectl --kubeconfig {{ k8s_cni_kubeconfig_path }}
    -n kube-system rollout restart daemonset/calico-node
  register: calico_node_restart
  changed_when: "'restarted' in calico_node_restart.stdout"
  when:
    - calico_force_apply | bool
    - calico_node_daemonset.rc == 0
  tags:
    - setup_cni
    - "setup_cni:calico"

- name: Wait for Calico nodes after restart
  ansible.builtin.command: >-
    kubectl --kubeconfig {{ k8s_cni_kubeconfig_path }}
    -n kube-system rollout status daemonset/calico-node --timeout=180s
  changed_when: false
  when:
    - calico_force_apply | bool
    - calico_node_daemonset.rc == 0
  tags:
    - setup_cni
    - "setup_cni:calico"

- name: Check Calico default IPPool CIDR
  ansible.builtin.command: >-
    kubectl --kubeconfig {{ k8s_cni_kubeconfig_path }}
    get ippool {{ calico_default_ippool_name }}
    -o jsonpath={.spec.cidr}
  register: calico_default_ippool_cidr
  changed_when: false
  failed_when: false
  when: calico_force_apply | bool
  tags:
    - setup_cni
    - "setup_cni:calico"

- name: Recreate Calico default IPPool with Kubernetes pod CIDR
  ansible.builtin.shell: |
    set -e
    kubectl --kubeconfig {{ k8s_cni_kubeconfig_path }} delete ippool {{ calico_default_ippool_name }} --ignore-not-found
    kubectl --kubeconfig {{ k8s_cni_kubeconfig_path }} apply -f - <<'EOF'
    apiVersion: crd.projectcalico.org/v1
    kind: IPPool
    metadata:
      name: {{ calico_default_ippool_name }}
    spec:
      blockSize: 26
      cidr: {{ calico_pod_cidr }}
      ipipMode: Always
      natOutgoing: true
      nodeSelector: all()
      vxlanMode: Never
    EOF
  args:
    executable: /bin/bash
  register: calico_recreate_ippool_result
  changed_when: "'created' in calico_recreate_ippool_result.stdout or 'deleted' in calico_recreate_ippool_result.stdout"
  when:
    - calico_force_apply | bool
    - calico_recreate_default_ippool | bool
    - calico_default_ippool_cidr.rc == 0
    - calico_default_ippool_cidr.stdout != calico_pod_cidr
  tags:
    - setup_cni
    - "setup_cni:calico"
