---
- name: Install utility packages
  apt:
    name:
      - coreutils
      - dnsutils
      - curl
      - traceroute
      - whois
      - bgpq3
      - net-tools
      - iputils-ping
      - iputils-tracepath
      - tar
      - gzip
      - less
      - wget
      - zutils
      - atop
      - htop
      - ncdu
      - iftop
      - iotop
      - tcptraceroute
      - oping
    state: present
    update_cache: true

- name: Ensure atop log directory exists
  file:
    path: /var/log/atop
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Configure atop logging
  copy:
    dest: /etc/default/atop
    owner: root
    group: root
    mode: "0644"
    content: |
      LOGOPTS=""
      LOGINTERVAL=10
      LOGGENERATIONS=28
      LOGPATH=/var/log/atop
  notify: Restart atop

- name: Ensure atop service is enabled and started
  service:
    name: atop
    enabled: true
    state: started
