---
- name: Install utility packages
  apt:
    name:
      - coreutils
      - dnsutils
      - curl
      - traceroute
      - whois
      - bgpq3
      - net-tools
      - netcat-openbsd
      - iputils-ping
      - iputils-tracepath
      - tar
      - gzip
      - less
      - wget
      - zutils
      - atop
      - logrotate
      - htop
      - ncdu
      - iftop
      - iotop
      - tcptraceroute
      - oping
      - tmux
    state: present
    update_cache: true
  tags:
    - utils
    - "utils:packages"

- name: Ensure atop log directory exists
  file:
    path: /var/log/atop
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags:
    - utils
    - "utils:atop"

- name: Configure atop logging
  copy:
    dest: /etc/default/atop
    owner: root
    group: root
    mode: "0644"
    content: |
      LOGOPTS=""
      LOGINTERVAL=10
      LOGGENERATIONS=7
      LOGPATH=/var/log/atop
  notify: Restart atop
  tags:
    - utils
    - "utils:atop"

- name: Configure atop log rotation
  copy:
    dest: /etc/logrotate.d/atop
    owner: root
    group: root
    mode: "0644"
    content: |
      /var/log/atop/atop_*
      {
          weekly
          maxsize 500M
          rotate 6
          missingok
          notifempty
          compress
          delaycompress
          copytruncate
      }
  tags:
    - utils
    - "utils:atop"

- name: Ensure atop service is enabled and started
  service:
    name: atop
    enabled: true
    state: started
  tags:
    - utils
    - "utils:atop"
