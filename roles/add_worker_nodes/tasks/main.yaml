---
- name: Set first Kubernetes master
  ansible.builtin.set_fact:
    k8s_first_master: "{{ groups[k8s_master_group][0] }}"
  tags:
    - add_worker_nodes
    - "add_worker_nodes:vars"

- name: Check whether this worker already joined
  ansible.builtin.stat:
    path: "{{ k8s_kubelet_config_path }}"
  register: k8s_worker_kubelet_conf
  tags:
    - add_worker_nodes
    - "add_worker_nodes:join"

- name: Check first master admin kubeconfig
  ansible.builtin.stat:
    path: /etc/kubernetes/admin.conf
  register: k8s_first_master_admin_conf
  delegate_to: "{{ k8s_first_master }}"
  run_once: true
  tags:
    - add_worker_nodes
    - "add_worker_nodes:join"

- name: Validate first master is initialized
  ansible.builtin.assert:
    that:
      - k8s_first_master_admin_conf.stat.exists
    fail_msg: >-
      First master {{ k8s_first_master }} is not initialized
      (/etc/kubernetes/admin.conf is missing). Fix kubeadm init before joining
      workers.
  run_once: true
  tags:
    - add_worker_nodes
    - "add_worker_nodes:join"

- name: Generate Kubernetes worker join command
  ansible.builtin.command: kubeadm token create --print-join-command
  register: k8s_worker_join_command
  changed_when: false
  delegate_to: "{{ k8s_first_master }}"
  run_once: true
  no_log: true
  when: groups['workers'] | length > 0
  tags:
    - add_worker_nodes
    - "add_worker_nodes:join"

- name: Join Kubernetes worker
  ansible.builtin.command: "{{ k8s_worker_join_command.stdout }}"
  when:
    - groups['workers'] | length > 0
    - not k8s_worker_kubelet_conf.stat.exists
  no_log: true
  tags:
    - add_worker_nodes
    - "add_worker_nodes:join"

- name: Label Kubernetes worker node
  ansible.builtin.command: >-
    kubectl --kubeconfig /etc/kubernetes/admin.conf
    label node {{ inventory_hostname }} node-role.kubernetes.io/worker= --overwrite
  register: k8s_label_worker_node
  changed_when: "'not labeled' not in k8s_label_worker_node.stdout"
  delegate_to: "{{ k8s_first_master }}"
  tags:
    - add_worker_nodes
    - "add_worker_nodes:labels"
