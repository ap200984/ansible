---
- name: Install Kubernetes apt prerequisites
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gpg
    state: present
    update_cache: false
  when: ansible_os_family == "Debian"
  tags:
    - install_k8s_packages
    - "install_k8s_packages:repo"

- name: Create apt keyring directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: ansible_os_family == "Debian"
  tags:
    - install_k8s_packages
    - "install_k8s_packages:repo"

- name: Download Kubernetes apt repository key
  ansible.builtin.get_url:
    url: "{{ kubernetes_apt_key_url }}"
    dest: /tmp/kubernetes-apt-release.key
    mode: "0644"
  when: ansible_os_family == "Debian"
  tags:
    - install_k8s_packages
    - "install_k8s_packages:repo"

- name: Install Kubernetes apt repository key
  ansible.builtin.command:
    cmd: "gpg --dearmor -o {{ kubernetes_apt_keyring }} /tmp/kubernetes-apt-release.key"
    creates: "{{ kubernetes_apt_keyring }}"
  when: ansible_os_family == "Debian"
  tags:
    - install_k8s_packages
    - "install_k8s_packages:repo"

- name: Configure Kubernetes apt repository
  ansible.builtin.apt_repository:
    repo: "{{ kubernetes_apt_repo }}"
    filename: kubernetes
    state: present
    update_cache: true
  when: ansible_os_family == "Debian"
  tags:
    - install_k8s_packages
    - "install_k8s_packages:repo"

- name: Install Kubernetes packages
  ansible.builtin.apt:
    name: "{{ kubernetes_packages }}"
    state: present
    update_cache: false
  when: ansible_os_family == "Debian"
  tags:
    - install_k8s_packages
    - "install_k8s_packages:packages"

- name: Hold Kubernetes packages
  ansible.builtin.dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop: "{{ kubernetes_packages }}"
  when: ansible_os_family == "Debian"
  tags:
    - install_k8s_packages
    - "install_k8s_packages:packages"
