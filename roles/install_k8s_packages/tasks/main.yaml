---
- name: Install Kubernetes apt prerequisites
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gpg
    state: present
    update_cache: false
  when: ansible_os_family == "Debian"
  tags:
    - install_k8s_packages
    - "install_k8s_packages:repo"

- name: Set Kubernetes apt proxy value
  ansible.builtin.set_fact:
    kubernetes_apt_proxy_effective: >-
      {{
        kubernetes_apt_proxy_effective
        | default(kubernetes_apt_proxy | default(''))
      }}
  tags:
    - install_k8s_packages
    - "install_k8s_packages:repo"

- name: Create apt keyring directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: ansible_os_family == "Debian"
  tags:
    - install_k8s_packages
    - "install_k8s_packages:repo"

- name: Force apt to use IPv4
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/99force-ipv4
    owner: root
    group: root
    mode: "0644"
    content: |
      Acquire::ForceIPv4 "true";
  when:
    - ansible_os_family == "Debian"
    - kubernetes_force_ipv4 | bool
  tags:
    - install_k8s_packages
    - "install_k8s_packages:repo"

- name: Configure Kubernetes apt proxy
  ansible.builtin.copy:
    dest: "{{ kubernetes_apt_proxy_conf }}"
    owner: root
    group: root
    mode: "0644"
    content: |
      Acquire::http::Proxy "{{ kubernetes_apt_proxy_effective }}";
      Acquire::https::Proxy "{{ kubernetes_apt_proxy_effective }}";
  when:
    - ansible_os_family == "Debian"
    - kubernetes_apt_proxy_effective | length > 0
  tags:
    - install_k8s_packages
    - "install_k8s_packages:repo"

- name: Download Kubernetes apt repository key
  ansible.builtin.command:
    cmd: >-
      curl -fsSL -4
      --proxy {{ kubernetes_apt_proxy_effective }}
      {{ kubernetes_apt_key_url }} -o {{ kubernetes_apt_key_tmp }}
    creates: "{{ kubernetes_apt_key_tmp }}"
  when: ansible_os_family == "Debian"
  tags:
    - install_k8s_packages
    - "install_k8s_packages:repo"

- name: Install Kubernetes apt repository key
  ansible.builtin.command:
    cmd: "gpg --dearmor -o {{ kubernetes_apt_keyring }} {{ kubernetes_apt_key_tmp }}"
    creates: "{{ kubernetes_apt_keyring }}"
  when: ansible_os_family == "Debian"
  tags:
    - install_k8s_packages
    - "install_k8s_packages:repo"

- name: Configure Kubernetes apt repository
  ansible.builtin.apt_repository:
    repo: "{{ kubernetes_apt_repo }}"
    filename: kubernetes
    state: present
    update_cache: true
  when: ansible_os_family == "Debian"
  tags:
    - install_k8s_packages
    - "install_k8s_packages:repo"

- name: Install Kubernetes packages
  ansible.builtin.apt:
    name: "{{ kubernetes_packages }}"
    state: present
    update_cache: false
  when: ansible_os_family == "Debian"
  tags:
    - install_k8s_packages
    - "install_k8s_packages:packages"

- name: Hold Kubernetes packages
  ansible.builtin.dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop: "{{ kubernetes_packages }}"
  when: ansible_os_family == "Debian"
  tags:
    - install_k8s_packages
    - "install_k8s_packages:packages"
