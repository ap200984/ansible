---
- name: Build VM list from inventory k8s_k112
  hosts: localhost
  gather_facts: false
  vars_files:
    - group_vars/k8s_k112.yml
  vars:
    k8s_cluster_raw_vm_hosts: "{{ vm_hosts | default('all') }}"
  tasks:
    - name: Parse selected K8s VM hosts
      ansible.builtin.set_fact:
        k8s_cluster_vm_hosts: >-
          {{
            (
              k8s_cluster_raw_vm_hosts
              if k8s_cluster_raw_vm_hosts is iterable and k8s_cluster_raw_vm_hosts is not string
              else k8s_cluster_raw_vm_hosts | string | regex_replace('\s', '') | split(',')
            )
            | map('trim')
            | reject('equalto', '')
            | list
          }}

    - name: Select K8s VM hosts
      ansible.builtin.set_fact:
        k8s_cluster_selected_hosts: "{{ groups['k8s'] if k8s_cluster_vm_hosts == ['all'] else k8s_cluster_vm_hosts }}"

    - name: Validate selected K8s VM definitions
      ansible.builtin.assert:
        that:
          - k8s_cluster_selected_hosts | length > 0
          - k8s_cluster_selected_hosts | difference(k8s_cluster_machines.keys() | list) | length == 0
        fail_msg: >-
          No VM definitions found for
          {{ k8s_cluster_selected_hosts | difference(k8s_cluster_machines.keys() | list) }}.
          Check vm_hosts or group_vars/k8s_k112.yml.

    - name: Initialize selected K8s VM list
      ansible.builtin.set_fact:
        k8s_cluster_vm_list: []

    - name: Build selected K8s VM list
      ansible.builtin.set_fact:
        k8s_cluster_vm_list: "{{ k8s_cluster_vm_list + [{'name': item} | combine(k8s_cluster_machines[item])] }}"
      loop: "{{ k8s_cluster_selected_hosts }}"

- import_playbook: create_vm.yaml
  vars:
    vm_list: "{{ hostvars['localhost']['k8s_cluster_vm_list'] }}"
